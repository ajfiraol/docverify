events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # ===================================================================
    # Upstream - Django Application
    # ===================================================================
    upstream docverify_app {
        server web:8000;
    }

    # ===================================================================
    # HTTP Server - Redirect to HTTPS
    # ===================================================================
    server {
        listen 80;
        server_name test.eventaxiss.com;

        return 301 https://$host$request_uri;
    }

    # ===================================================================
    # HTTPS Server
    # ===================================================================
    server {
        listen 443 ssl http2;
        server_name test.eventaxiss.com;

        ssl_certificate /etc/letsencrypt/live/test.eventaxiss.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/test.eventaxiss.com/privkey.pem;

        # ===================================================================
        # Static Files
        # ===================================================================
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ===================================================================
        # Media Files
        # ===================================================================
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ===================================================================
        # Main Application
        # ===================================================================
        location / {
            proxy_pass http://docverify_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }
}