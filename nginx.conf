# ===================================================================
# nginx.conf - Nginx Configuration for DocVerify
# ===================================================================
# This configuration sets up Nginx as a reverse proxy for the
# Django application, serving static files and proxying API requests.
#
# Features:
# - Gzip compression
# - Security headers
# - Static file caching
# - Media file serving
# ===================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ===================================================================
    # Logging Format
    # ===================================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ===================================================================
    # Performance
    # ===================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ===================================================================
    # Gzip Compression
    # ===================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # ===================================================================
    # Security Headers
    # ===================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ===================================================================
    # Upstream - Django Application
    # ===================================================================
    upstream docverify_app {
        server web:8000;
    }

    # ===================================================================
    # Server Configuration
    # ===================================================================
    server {
        listen 80;
        server_name _;
        charset utf-8;

        # ===================================================================
        # Static Files - Cached
        # ===================================================================
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ===================================================================
        # Media Files
        # ===================================================================
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ===================================================================
        # Main Application
        # ===================================================================
        location / {
            proxy_pass http://docverify_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ===================================================================
        # Health Check Endpoint
        # ===================================================================
        location /health/ {
            proxy_pass http://docverify_app;
            access_log off;
        }
    }
}
