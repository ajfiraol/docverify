# ===================================================================
# docker-compose.yml - DocVerify Production Deployment
# ===================================================================

services:
  web:
    image: IMAGE_PLACEHOLDER
    container_name: docverify_web
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://docverify:docverify123@db:5432/docverify
      - DJANGO_SECRET_KEY=production-key-change-this
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=test.eventaxiss.com
    depends_on:
      db:
        condition: service_healthy
    networks:
      - docverify_network
    ports:
      - "8000:8000"

  db:
    image: postgres:15-alpine
    container_name: docverify_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=docverify
      - POSTGRES_USER=docverify
      - POSTGRES_PASSWORD=docverify123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - docverify_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docverify"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  docverify_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local