# ===================================================================
# CD Workflow - Continuous Deployment
# ===================================================================
# This workflow deploys the application when code is pushed to main.
# It builds and pushes Docker images, then deploys to your VPS.
#
# Triggers:
#   - Push to main branch
#
# What it does:
#   1. Builds Docker image
#   2. Pushes to Docker Hub / GHCR
#   3. SSH into VPS and pulls latest image
#   4. Runs migrations and restarts services
#
# Secrets Required (GitHub > Settings > Secrets):
#   - DOCKER_USERNAME: Docker Hub username
#   - DOCKER_PASSWORD: Docker Hub password
#   - VPS_HOST: Your VPS IP address
#   - VPS_SSH_KEY: Private SSH key
#   - VPS_USER: SSH user (usually root)
# ===================================================================

name: CD - Deploy to VPS

on:
  push:
    branches: ["*"]
  workflow_dispatch:  # Allow manual deployment

jobs:
  # -------------------------------------------------------------------------
  # Build and Push Docker Image
  # -------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------------------
      # Checkout Code
      # ---------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------------------------------------------------
      # Set up Docker Buildx
      # ---------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------------------------------------------------------------------
      # Login to Docker Hub
      # ---------------------------------------------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------------------------------------------------------------------
      # Build and Push Image
      # ---------------------------------------------------------------------
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: "${{ secrets.DOCKER_USERNAME }}/docverify:latest"
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # Deploy to VPS
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # ---------------------------------------------------------------------
      # Deploy via SSH
      # ---------------------------------------------------------------------
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # Login to Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Use latest tag
            DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            IMAGE_TAG="$DOCKER_USERNAME/docverify:latest"
            echo "Deploying image: $IMAGE_TAG"

            # Create deployment directory
            mkdir -p ~/docverify

            # Pull latest docker-compose.yml
            curl -s "https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml" > ~/docverify/docker-compose.yml

            # Create .env with actual values
            cat > ~/docverify/.env << 'EOF'
DJANGO_SECRET_KEY=production-secret-key-12345678
DJANGO_DEBUG=False
DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
POSTGRES_DB=docverify
POSTGRES_USER=docverify
POSTGRES_PASSWORD=docverify123
EOF

            # Pull new image
            docker pull "$IMAGE_TAG"

            # Stop existing containers if any
            docker compose -f ~/docverify/docker-compose.yml down 2>/dev/null || true

            # Start services
            docker compose -f ~/docverify/docker-compose.yml up -d

            # Wait for db to be ready
            echo "Waiting for database..."
            sleep 15

            # Check if web container is running
            docker compose -f ~/docverify/docker-compose.yml ps

            # Run migrations
            echo "Running migrations..."
            docker compose -f ~/docverify/docker-compose.yml exec -T web python manage.py migrate --noinput || echo "Migration done or skipped"

            echo "Deployment completed!"
            docker compose -f ~/docverify/docker-compose.yml ps
            echo "Done!"
